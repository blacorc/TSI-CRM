<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSI CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--border:#e2e5ea;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --accent:#2563eb;--accent-light:#eff6ff;
  --active:#16a34a;--active-bg:#f0fdf4;--active-border:#bbf7d0;
  --declining:#dc2626;--declining-bg:#fef2f2;--declining-border:#fecaca;
  --watch:#d97706;--watch-bg:#fffbeb;--watch-border:#fde68a;
  --cull:#6b7280;--cull-bg:#f9fafb;--cull-border:#e5e7eb;
  --oem:#1d4ed8;--oem-bg:#dbeafe;
  --claude:#7c3aed;--claude-bg:#ede9fe;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}

/* Top bar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:20px;height:52px;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-brand{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.topbar-brand span{color:var(--accent)}
.topbar-nav{display:flex;gap:2px;margin-left:16px}
.nav-btn{padding:6px 14px;border:none;background:none;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s;white-space:nowrap}
.nav-btn:hover{background:#f3f4f6;color:var(--text)}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.topbar-search{margin-left:auto;position:relative}
.search-input{width:240px;padding:7px 12px 7px 34px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;outline:none;transition:.2s;background:#f9fafb}
.search-input:focus{border-color:var(--accent);background:#fff;width:280px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* Stats bar */
.statsbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:24px;flex-shrink:0}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-val{font-size:20px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.stat-val.active{color:var(--active)}
.stat-val.declining{color:var(--declining)}
.stat-val.watch{color:var(--watch)}
.stat-val.cull{color:var(--cull)}
.stat-val.claude{color:var(--claude)}
.stat-sep{width:1px;background:var(--border);align-self:stretch;margin:2px 0}

/* Filter bar */
.filterbar{padding:10px 20px;display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border)}
.filter-pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:.15s;white-space:nowrap}
.filter-pill:hover{border-color:#9ca3af}
.filter-pill.active-pill{background:var(--text);border-color:var(--text);color:#fff}
.filter-pill.active-f{background:var(--active);border-color:var(--active);color:#fff}
.filter-pill.declining-f{background:var(--declining);border-color:var(--declining);color:#fff}
.filter-pill.watch-f{background:var(--watch);border-color:var(--watch);color:#fff}
.filter-pill.cull-f{background:var(--cull);border-color:var(--cull);color:#fff}
.filter-pill.oem-f{background:var(--oem);border-color:var(--oem);color:#fff}
.filter-sep{flex:1}
.result-count{font-size:12px;color:var(--text2);font-weight:500;white-space:nowrap}

/* Content */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-pane{display:none;flex:1;overflow-y:auto;padding:16px 20px}
.tab-pane.active{display:block}

/* Table */
.data-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.data-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);background:#f9fafb;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.data-table th:hover{color:var(--text)}
.data-table td{padding:10px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafafa}
.data-table tr.expanded td{background:var(--accent-light)}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px;white-space:nowrap}
.badge-ACTIVE{background:var(--active-bg);color:var(--active);border:1px solid var(--active-border)}
.badge-DECLINING{background:var(--declining-bg);color:var(--declining);border:1px solid var(--declining-border)}
.badge-WATCH{background:var(--watch-bg);color:var(--watch);border:1px solid var(--watch-border)}
.badge-CULL{background:var(--cull-bg);color:var(--cull);border:1px solid var(--cull-border)}
.badge-oem{background:var(--oem-bg);color:var(--oem);border:1px solid #bfdbfe;margin-left:4px}
.badge-claude{background:var(--claude-bg);color:var(--claude);border:1px solid #ddd6fe;font-size:9px;padding:1px 6px}

/* Sparkline bars */
.spark{display:flex;align-items:flex-end;gap:2px;height:20px;width:72px}
.spark-bar{flex:1;border-radius:1px 1px 0 0;min-height:1px}
.spark-bar.has-val{background:var(--accent);opacity:.7}
.spark-bar.zero{background:#e5e7eb}
.spark-bar.recent{opacity:1}

/* Expand row */
.expand-row td{padding:0}
.expand-inner{padding:16px 20px;background:#f8f9ff;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.expand-section h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:8px}
.contact-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start}
.contact-card-left .cn{font-size:13px;font-weight:600;color:var(--text)}
.contact-card-left .ct{font-size:11px;color:var(--text2);margin-top:2px}
.contact-card-right{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px}
.ic-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:14px;text-decoration:none;transition:.15s;color:var(--text2)}
.ic-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.ic-btn.disabled{opacity:.3;pointer-events:none}
.ic-btn.draft-btn{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--accent);color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:600;letter-spacing:.3px}
.ic-btn.draft-btn.disabled{background:var(--border);color:var(--text3)}
.acct-name{font-weight:600;color:var(--text);cursor:pointer}
.acct-name:hover{color:var(--accent)}
.acct-loc{font-size:12px;color:var(--text2)}
.sales-total{font-size:12px;font-weight:600}
.sales-total.has-sales{color:var(--active)}
.sales-total.no-sales{color:var(--text3)}

/* Call log */
.log-panel{max-width:700px;margin:0 auto}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.form-card h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group:last-child{margin-bottom:0}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-bottom:4px;display:block}
.form-ctrl{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#fafafa;outline:none;transition:.2s}
.form-ctrl:focus{border-color:var(--accent);background:#fff}
textarea.form-ctrl{min-height:72px;resize:vertical}
.btn-primary{padding:9px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary:hover{background:#1d4ed8}
.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px}
.log-entry-bar{width:3px;border-radius:2px;background:var(--accent);flex-shrink:0}
.log-body{flex:1}
.log-head{display:flex;justify-content:space-between;margin-bottom:4px}
.log-acct{font-weight:700;font-size:14px}
.log-date{font-size:11px;color:var(--text2)}
.log-outcome{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.oc-connected{background:#dcfce7;color:#166534}
.oc-voicemail{background:#fef3c7;color:#92400e}
.oc-noanswer{background:#fee2e2;color:#991b1b}
.oc-meeting{background:#dbeafe;color:#1e40af}
.log-notes-text{font-size:12px;color:var(--text2);line-height:1.5}
.log-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px;flex-shrink:0;margin-left:4px}
.log-del:hover{color:var(--declining)}

/* Cull review */
.cull-header{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:#856404;font-weight:500}
.cull-row-actions{display:flex;gap:6px}
.btn-keep{padding:4px 12px;background:var(--active-bg);color:var(--active);border:1px solid var(--active-border);border-radius:5px;font-size:11px;font-weight:700;cursor:pointer}
.btn-cull{padding:4px 12px;background:var(--declining-bg);color:var(--declining);border:1px solid var(--declining-border);border-radius:5px;font-size:11px;font-weight:700;cursor:pointer}

/* Contacts tab */
.contacts-table .badge-claude{margin-left:4px}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text3)}

/* Responsive clamp */
@media(max-width:900px){.topbar-search .search-input{width:160px}.expand-grid{grid-template-columns:1fr}}
</style>
</head>

<!-- TOP BAR -->

    <button class="nav-btn" onclick="switchTab('contacts',this)">Contacts</button>
    <button class="nav-btn" onclick="switchTab('cull',this)">Cull Review</button>
    <button class="nav-btn" onclick="switchTab('log',this)">Call Log</button>
  </div>
  <div class="topbar-search">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="search" placeholder="Search..." autocomplete="off">
  </div>
</div>

<!-- STATS BAR -->
<div class="statsbar" id="statsbar"></div>

<!-- FILTER BAR -->
<div class="filterbar" id="filterbar">
  <button class="filter-pill active-pill" onclick="setFilter('ALL',this)">All</button>
  <button class="filter-pill" onclick="setFilter('ACTIVE',this)">✅ Active</button>
  <button class="filter-pill" onclick="setFilter('DECLINING',this)">📉 Declining</button>
  <button class="filter-pill" onclick="setFilter('WATCH',this)">👀 Watch</button>
  <button class="filter-pill" onclick="setFilter('CULL',this)">🗑 Cull</button>
  <button class="filter-pill" onclick="setFilter('OEM',this)">🔩 OEM</button>
  <div class="filter-sep"></div>
  <span class="result-count" id="result-count"></span>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ACCOUNTS -->
  <div class="tab-pane active" id="tab-accounts">
    <table class="data-table" id="accounts-table">
      <thead>
        <tr>
          <th onclick="sortBy('name')">Account ↕</th>
          <th onclick="sortBy('health')">Status</th>
          <th>Location</th>
          <th onclick="sortBy('total')">6yr Sales ↕</th>
          <th>Trend</th>
          <th>Contacts</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="accounts-body"></tbody>
    </table>
  </div>

  <!-- CONTACTS -->
  <div class="tab-pane" id="tab-contacts">
    <table class="data-table contacts-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Title</th>
          <th>Company</th>
          <th>Status</th>
          <th>Source</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="contacts-body"></tbody>
    </table>
  </div>

  <!-- CULL REVIEW -->
  <div class="tab-pane" id="tab-cull">
    <div class="cull-header" id="cull-header"></div>
    <table class="data-table">
      <thead>
        <tr>
          <th>Account</th>
          <th>Location</th>
          <th>Last Sale</th>
          <th>6yr Total</th>
          <th>Notes</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cull-body"></tbody>
    </table>
  </div>

  <!-- CALL LOG -->
  <div class="tab-pane" id="tab-log">
    <div class="log-panel">
      <div class="form-card">
        <h3>📞 Log a Call</h3>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Account</label>
            <input class="form-ctrl" id="log-account" placeholder="Account name..." list="acct-list" autocomplete="off">
            <datalist id="acct-list"></datalist>
          </div>
          <div class="form-group">
            <label class="form-label">Contact (optional)</label>
            <input class="form-ctrl" id="log-contact" placeholder="Contact name...">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Outcome</label>
            <select class="form-ctrl" id="log-outcome">
              <option value="connected">✅ Connected</option>
              <option value="voicemail">📬 Voicemail</option>
              <option value="noanswer">📵 No Answer</option>
              <option value="meeting">📅 Meeting Scheduled</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input class="form-ctrl" id="log-date" type="text" readonly style="background:#f3f4f6;color:var(--text2)" id="log-date-display">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-ctrl" id="log-notes" placeholder="What was discussed..."></textarea>
        </div>
        <button class="btn-primary" onclick="saveLog()">Save Call Log</button>
      </div>
      <div id="log-list"></div>
    </div>
  </div>

</div>

// Stats bar
function renderStats() {
  const active = ACCOUNTS.filter(a=>a.health==='ACTIVE').length;
  const declining = ACCOUNTS.filter(a=>a.health==='DECLINING').length;
  const watch = ACCOUNTS.filter(a=>a.health==='WATCH').length;
  const cull = ACCOUNTS.filter(a=>a.health==='CULL' && !culledAccounts.has(a.id)).length;
  const contactCount = ZI_CONTACTS.length;
  document.getElementById('statsbar').innerHTML = `
    <div class="stat"><div class="stat-val">${ACCOUNTS.length}</div><div class="stat-lbl">Total Accounts</div></div>

}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
  const fb = document.getElementById('filterbar');
  fb.style.display = (tab==='accounts') ? 'flex' : 'none';
  if(tab==='accounts') renderAccounts();
  else if(tab==='contacts') renderContacts();
  else if(tab==='cull') renderCull();
  else renderLog();
}

  document.querySelectorAll('.filter-pill').forEach(p=>p.className='filter-pill');
  if(btn) {
    const cls = {ALL:'active-pill',ACTIVE:'active-f',DECLINING:'declining-f',WATCH:'watch-f',CULL:'cull-f',OEM:'oem-f'}[f];
    btn.classList.add(cls);
  }
  renderAccounts();
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  if(currentTab==='accounts') renderAccounts();
  else if(currentTab==='contacts') renderContacts();
});

function sortBy(key) {
  if(sortKey===key) sortDir *= -1; else { sortKey=key; sortDir=1; }
  renderAccounts();
}

function formatMoney(v) {
  if(!v||v===0) return '—';
  if(v>=1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if(v>=1000) return '$'+Math.round(v/1000)+'K';
  return '$'+Math.round(v);
}

function sparkline(sales) {
  const max = Math.max(...sales, 1);
  return '<div class="spark">' + sales.map((v,i)=>{
    const pct = v>0 ? Math.max(v/max*100, 8) : 0;
    const cls = v===0 ? 'zero' : (i>=4 ? 'has-val recent' : 'has-val');
    return `<div class="spark-bar ${cls}" style="height:${v===0?'3px':pct+'%'}"></div>`;
  }).join('') + '</div>';
}

function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

function renderAccounts() {
  let list = [...ACCOUNTS];
  if(currentFilter==='OEM') list = list.filter(a=>a.oem);
  else if(currentFilter==='ALL') list = list.filter(a=>!culledAccounts.has(a.id));
  else if(currentFilter==='CULL') list = list.filter(a=>a.health==='CULL' && !culledAccounts.has(a.id));
  else list = list.filter(a=>a.health===currentFilter);

  if(searchQ) list = list.filter(a=>
    a.name.toLowerCase().includes(searchQ)||
    (a.city||'').toLowerCase().includes(searchQ)||
    (a.notes||'').toLowerCase().includes(searchQ)||
    (a.state||'').toLowerCase().includes(searchQ)
  );

  const healthOrder = {ACTIVE:0,DECLINING:1,WATCH:2,CULL:3};
  list.sort((a,b)=>{
    let av = sortKey==='name' ? a.name : sortKey==='total' ? (a.total||0) : healthOrder[a.health];
    let bv = sortKey==='name' ? b.name : sortKey==='total' ? (b.total||0) : healthOrder[b.health];
    if(typeof av==='string') return av.localeCompare(bv)*sortDir;
    return (av-bv)*sortDir;
  });

  document.getElementById('result-count').textContent = list.length + ' accounts';

  const tbody = document.getElementById('accounts-body');
  if(!list.length){ tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text2)">No accounts match</td></tr>`; return; }

  tbody.innerHTML = list.map(a => {
    const contacts = contactIdx[a.name] || [];
    const oemBadge = a.oem ? `<span class="badge badge-oem">🔩 OEM</span>` : '';
    const contactChip = contacts.length ? `<span style="font-size:11px;color:var(--claude);font-weight:600">⚡ ${contacts.length}</span>` : '<span style="color:var(--text3);font-size:11px">—</span>';
    return `<tr id="row-${a.id}" onclick="toggleExpand(${a.id})" style="cursor:pointer">
      <td><div class="acct-name">${esc(a.name)} ${oemBadge}</div><div class="acct-loc">${esc(a.city)||''}${a.state?', '+a.state:''}</div></td>
      <td><span class="badge badge-${a.health}">${a.health}</span></td>
      <td style="color:var(--text2);font-size:12px">${esc(a.city)||'—'}, ${esc(a.state)||''}</td>
      <td><span class="sales-total ${a.total>0?'has-sales':'no-sales'}">${formatMoney(a.total)}</span></td>
      <td>${sparkline(a.sales)}</td>
      <td>${contactChip}</td>
      <td onclick="event.stopPropagation()">
        ${a.phone?`<a class="ic-btn" href="tel:${a.phone}" title="Call">📞</a>`:''}
        <button class="ic-btn" onclick="prefillLog('${esc(a.name)}')" title="Log call">📝</button>
      </td>
    </tr>
    <tr class="expand-row" id="expand-${a.id}" style="display:none">
      <td colspan="7">${expandHtml(a, contacts)}</td>
    </tr>`;
  }).join('');
}

function expandHtml(a, contacts) {
  const notes = a.notes ? `<p style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px">${esc(a.notes)}</p>` : '';
  const salesYears = ['2021','2022','2023','2024','2025','2026'];
  const salesBreakdown = `<div style="display:flex;gap:16px;margin-bottom:12px">${a.sales.map((v,i)=>`<div style="text-align:center"><div style="font-size:11px;color:var(--text2)">${salesYears[i]}</div><div style="font-size:12px;font-weight:600;color:${v>0?'var(--active)':'var(--text3)'}">${v>0?formatMoney(v):'—'}</div></div>`).join('')}</div>`;
  const contactsHtml = contacts.length ? contacts.map(c => `
    <div class="contact-card">
      <div class="contact-card-left">
        <div class="cn">${esc(c.name)} <span class="badge badge-claude">✦ Claude AI</span></div>
        <div class="ct">${esc(c.title)}</div>
      </div>
      <div class="contact-card-right">
        ${c.email?`<a class="ic-btn" href="mailto:${c.email}" title="${c.email}">✉️</a>`:`<a class="ic-btn disabled" title="No email on file">✉️</a>`}
        ${(c.phone||c.directPhone||c.mobilePhone)?`<a class="ic-btn" href="tel:${c.phone||c.directPhone||c.mobilePhone}" title="${c.phone||c.directPhone||c.mobilePhone}">📞</a>`:`<a class="ic-btn disabled" title="No phone on file">📞</a>`}
        <a class="ic-btn" href="${c.ziLink}" target="_blank" title="View in ZoomInfo">🔗</a>
        ${c.email?`<a class="ic-btn draft-btn" href="mailto:${c.email}?subject=${encodeURIComponent('TSI Solutions - '+a.name+' automation supplier')}&body=${encodeURIComponent('Hey '+c.firstName+',\n\nHope you\'ve been doing well.')}" title="Draft email to ${c.firstName}">✍️ Draft</a>`:`<a class="ic-btn disabled draft-btn" title="No email — cannot draft">✍️ Draft</a>`}
      </div>
    </div>`).join('') : '<p style="font-size:12px;color:var(--text3);font-style:italic">No ZoomInfo contacts found for this account</p>';

  return `<div class="expand-inner"><div class="expand-grid">
    <div>${notes}${salesBreakdown}</div>
    <div><div class="expand-section"><h4>ZoomInfo Contacts</h4>${contactsHtml}</div></div>
  </div></div>`;
}

function toggleExpand(id) {
  const row = document.getElementById('expand-'+id);
  if(!row) return;
  const visible = row.style.display !== 'none';
  row.style.display = visible ? 'none' : 'table-row';
  const mainRow = document.getElementById('row-'+id);
  if(mainRow) mainRow.classList.toggle('expanded', !visible);
}

function renderContacts() {
  let list = [...ZI_CONTACTS];
  if(searchQ) list = list.filter(c=>
    c.name.toLowerCase().includes(searchQ)||
    c.company.toLowerCase().includes(searchQ)||
    c.title.toLowerCase().includes(searchQ)
  );
  const tbody = document.getElementById('contacts-body');
  if(!list.length){ tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text2)">No contacts found</td></tr>`; return; }
  tbody.innerHTML = list.map(c => {
    const acct = ACCOUNTS.find(a=>a.name===c.company);
    const health = acct ? acct.health : c.health;
    return `<tr>
      <td style="font-weight:600">${esc(c.name)}</td>
      <td style="color:var(--text2);font-size:12px">${esc(c.title)}</td>
      <td><span style="font-size:12px">${esc(c.company)}</span>${acct&&acct.oem?'<span class="badge badge-oem" style="margin-left:4px">🔩 OEM</span>':''}</td>
      <td><span class="badge badge-${health}">${health}</span></td>
      <td><span class="badge badge-claude">✦ Claude AI</span></td>
      <td>
        ${c.email?`<a class="ic-btn" href="mailto:${c.email}" title="${c.email}">✉️</a>`:`<a class="ic-btn disabled" title="No email on file">✉️</a>`}
        ${(c.phone||c.directPhone||c.mobilePhone)?`<a class="ic-btn" href="tel:${c.phone||c.directPhone||c.mobilePhone}" title="${c.phone||c.directPhone||c.mobilePhone}">📞</a>`:`<a class="ic-btn disabled" title="No phone on file">📞</a>`}
        <a class="ic-btn" href="${c.ziLink}" target="_blank" title="ZoomInfo profile">🔗</a>
        ${c.email?`<a class="ic-btn draft-btn" href="mailto:${c.email}?subject=${encodeURIComponent('TSI Solutions - '+c.company+' automation supplier')}&body=${encodeURIComponent('Hey '+c.firstName+',\n\nHope you\'ve been doing well.')}" title="Draft email to ${c.firstName}">✍️ Draft</a>`:`<a class="ic-btn disabled draft-btn" title="No email — cannot draft">✍️ Draft</a>`}
      </td>
    </tr>`;
  }).join('');
}

function renderCull() {
  const list = ACCOUNTS.filter(a=>a.health==='CULL' && !culledAccounts.has(a.id) && !keptAccounts.has(a.id));
  const kept = ACCOUNTS.filter(a=>keptAccounts.has(a.id) && a.health==='CULL');
  document.getElementById('cull-header').innerHTML = `🗑️ <strong>${list.length} accounts</strong> flagged for culling — never purchased or no sales in 3+ years. Review each and keep or confirm cull. <strong>${kept.length} kept</strong> so far (moved to Watch).`;
  const tbody = document.getElementById('cull-body');
  if(!list.length){ tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text2)">✅ All cull candidates reviewed!</td></tr>`; return; }
  tbody.innerHTML = list.map(a => {
    const lastSaleYr = a.sales.reduce((acc,v,i)=>v>0?i:acc,-1);
    const lastSaleLabel = lastSaleYr>=0 ? [2021,2022,2023,2024,2025,2026][lastSaleYr] : 'Never';
    return `<tr>
      <td><div style="font-weight:600">${esc(a.name)}</div>${a.oem?'<span class="badge badge-oem">🔩 OEM</span>':''}</td>
      <td style="color:var(--text2);font-size:12px">${esc(a.city)||'—'}, ${esc(a.state)||''}</td>
      <td style="font-size:12px;color:${lastSaleYr<0?'var(--text3)':'var(--text2)'}">${lastSaleLabel}</td>
      <td><span class="sales-total ${a.total>0?'has-sales':'no-sales'}">${formatMoney(a.total)}</span></td>
      <td style="font-size:11px;color:var(--text2);max-width:240px">${a.notes?esc(a.notes.substring(0,100))+(a.notes.length>100?'…':''):'—'}</td>
      <td><div class="cull-row-actions">
        <button class="btn-keep" onclick="keepAccount(${a.id})">✓ Keep</button>
        <button class="btn-cull" onclick="cullAccount(${a.id})">✕ Cull</button>
      </div></td>
    </tr>`;
  }).join('');
}

function keepAccount(id) {
  keptAccounts.add(id);
  localStorage.setItem('tsi_kept', JSON.stringify([...keptAccounts]));
  const a = ACCOUNTS.find(x=>x.id===id);
  if(a) a.health='WATCH';
  renderCull(); renderStats();
}

function cullAccount(id) {
  culledAccounts.add(id);
  localStorage.setItem('tsi_culled', JSON.stringify([...culledAccounts]));
  renderCull(); renderStats();
}

function prefillLog(name) {
  switchTab('log', document.querySelectorAll('.nav-btn')[3]);
  setTimeout(()=>{ document.getElementById('log-account').value=name; },50);
}

function getLogs(){ try{ return JSON.parse(localStorage.getItem('tsi_logs')||'[]'); }catch(e){return[];} }
function saveLogs(l){ localStorage.setItem('tsi_logs', JSON.stringify(l)); }

function saveLog() {
  const account = document.getElementById('log-account').value.trim();
  if(!account){ alert('Please enter an account name'); return; }
  const log = { id:Date.now(), account, contact:document.getElementById('log-contact').value.trim(), outcome:document.getElementById('log-outcome').value, notes:document.getElementById('log-notes').value.trim(), date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) };
  const logs = getLogs(); logs.unshift(log); saveLogs(logs);
  document.getElementById('log-account').value='';
  document.getElementById('log-contact').value='';
  document.getElementById('log-notes').value='';
  renderLog();
}

function deleteLog(id){ if(!confirm('Delete this log entry?')) return; saveLogs(getLogs().filter(l=>l.id!==id)); renderLog(); }

function renderLog() {
  const logs = getLogs();
  const el = document.getElementById('log-list');
  if(!logs.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No calls logged yet</div><div class="empty-sub">Log your first call above</div></div>`; return; }
  const oc = {connected:'oc-connected',voicemail:'oc-voicemail',noanswer:'oc-noanswer',meeting:'oc-meeting'};
  const ol = {connected:'✅ Connected',voicemail:'📬 Voicemail',noanswer:'📵 No Answer',meeting:'📅 Meeting Scheduled'};
  el.innerHTML = logs.map(l=>`<div class="log-entry">
    <div class="log-entry-bar"></div>
    <div class="log-body">
      <div class="log-head"><span class="log-acct">${esc(l.account)}</span><div style="display:flex;gap:8px;align-items:center"><span class="log-date">${esc(l.date)}</span><button class="log-del" onclick="deleteLog(${l.id})">🗑</button></div></div>
      ${l.contact?`<div style="font-size:12px;color:var(--text2);margin-bottom:4px">👤 ${esc(l.contact)}</div>`:''}
      <span class="log-outcome ${oc[l.outcome]||''}">${ol[l.outcome]||l.outcome}</span>
      ${l.notes?`<div class="log-notes-text">${esc(l.notes)}</div>`:''}
    </div>
  </div>`).join('');
}

// Init
renderStats();
renderAccounts();
renderLog();
</script>
</body>
</html>
